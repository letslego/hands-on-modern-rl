<svg xmlns="http://www.w3.org/2000/svg" width="760" height="250" viewBox="0 0 760 250" role="img" aria-labelledby="title desc">
  <title id="title">Two-state Bellman example</title>
  <desc id="desc">Two states transition to each other with rewards 2 and 1, illustrating v1=2+0.5v2 and v2=1+0.5v1.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#16a34a"/>
    </marker>
    <style>
      .state{fill:#eef2ff;stroke:#4338ca;stroke-width:2}.label{font:600 20px system-ui,sans-serif;fill:#111827}.small{font:15px system-ui,sans-serif;fill:#374151}.reward{font:600 16px system-ui,sans-serif;fill:#dc2626}.eq{font:18px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#111827}.box{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5}.arrow{stroke:#16a34a;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect x="20" y="20" width="720" height="210" rx="18" class="box"/>
  <circle cx="185" cy="115" r="50" class="state"/>
  <text x="185" y="110" text-anchor="middle" class="label">s₁</text>
  <text x="185" y="135" text-anchor="middle" class="small">value v₁</text>
  <circle cx="430" cy="115" r="50" class="state"/>
  <text x="430" y="110" text-anchor="middle" class="label">s₂</text>
  <text x="430" y="135" text-anchor="middle" class="small">value v₂</text>
  <path d="M235 95 C290 45 330 45 380 95" class="arrow"/>
  <text x="308" y="55" text-anchor="middle" class="reward">reward = 2</text>
  <path d="M380 138 C325 195 285 195 235 138" class="arrow"/>
  <text x="308" y="202" text-anchor="middle" class="reward">reward = 1</text>
  <text x="535" y="88" class="eq">γ = 0.5</text>
  <text x="535" y="122" class="eq">v₁ = 2 + 0.5v₂</text>
  <text x="535" y="154" class="eq">v₂ = 1 + 0.5v₁</text>
  <text x="535" y="188" class="eq">⇒ v₁=3.33, v₂=2.67</text>
</svg>
