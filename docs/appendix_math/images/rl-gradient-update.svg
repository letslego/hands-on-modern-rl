<svg xmlns="http://www.w3.org/2000/svg" width="760" height="285" viewBox="0 0 760 285" role="img" aria-labelledby="title desc">
  <title id="title">Gradient update example</title>
  <desc id="desc">A concave objective with a parameter updated from 0.2 to 0.32 along positive gradient.</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#16a34a"/></marker><style>.box{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5}.axis{stroke:#64748b;stroke-width:2}.curve{stroke:#4f46e5;stroke-width:4;fill:none}.grad{stroke:#16a34a;stroke-width:4;fill:none;marker-end:url(#arrow)}.dot{fill:#dc2626}.opt{fill:#16a34a}.txt{font:15px system-ui,sans-serif;fill:#111827}.math{font:17px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#111827}.label{font:700 17px system-ui,sans-serif;fill:#111827}</style></defs>
  <rect x="20" y="20" width="720" height="245" rx="18" class="box"/>
  <line x1="75" y1="220" x2="385" y2="220" class="axis"/><line x1="75" y1="220" x2="75" y2="55" class="axis"/>
  <path d="M85 190 C135 150 190 105 245 70 C300 105 345 155 380 205" class="curve"/>
  <circle cx="132" cy="153" r="6" class="dot"/><text x="101" y="178" class="txt">θ=0.2</text>
  <circle cx="183" cy="114" r="6" class="opt"/><text x="163" y="95" class="txt">θ'=0.32</text>
  <circle cx="245" cy="70" r="7" class="opt"/><text x="226" y="48" class="label">best θ=0.8</text>
  <path d="M140 148 C153 135 164 126 178 117" class="grad"/>
  <text x="55" y="45" class="txt">J(θ)</text><text x="385" y="241" class="txt">θ</text>
  <text x="430" y="82" class="math">J(θ)=-(θ-0.8)²+1</text>
  <text x="430" y="122" class="math">J'(θ)=-2(θ-0.8)</text>
  <text x="430" y="162" class="math">J'(0.2)=1.2</text>
  <text x="430" y="202" class="math">θ ← 0.2 + 0.1×1.2 = 0.32</text>
</svg>
