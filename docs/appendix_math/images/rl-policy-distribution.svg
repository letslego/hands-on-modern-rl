<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300" role="img" aria-labelledby="title desc">
  <title id="title">Policy entropy and KL example</title>
  <desc id="desc">Two action distributions are shown as bars, comparing high entropy and low entropy policies and a KL constraint.</desc>
  <style>.box{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5}.axis{stroke:#64748b;stroke-width:2}.barA{fill:#60a5fa}.barB{fill:#f97316}.txt{font:15px system-ui,sans-serif;fill:#111827}.label{font:700 17px system-ui,sans-serif;fill:#111827}.math{font:17px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#111827}.grid{stroke:#e2e8f0;stroke-width:1}</style>
  <rect x="20" y="20" width="720" height="260" rx="18" class="box"/>
  <text x="95" y="55" class="label">policy A: [0.5, 0.5]</text>
  <line x1="80" y1="210" x2="260" y2="210" class="axis"/><line x1="80" y1="210" x2="80" y2="75" class="axis"/>
  <line x1="80" y1="142" x2="260" y2="142" class="grid"/>
  <rect x="110" y="142" width="45" height="68" class="barA"/><rect x="185" y="142" width="45" height="68" class="barA"/>
  <text x="122" y="232" class="txt">left</text><text x="190" y="232" class="txt">right</text><text x="113" y="135" class="txt">0.5</text><text x="188" y="135" class="txt">0.5</text>
  <text x="118" y="258" class="math">H(A)=1.0</text>
  <text x="360" y="55" class="label">policy B: [0.9, 0.1]</text>
  <line x1="350" y1="210" x2="530" y2="210" class="axis"/><line x1="350" y1="210" x2="350" y2="75" class="axis"/>
  <line x1="350" y1="142" x2="530" y2="142" class="grid"/>
  <rect x="380" y="88" width="45" height="122" class="barB"/><rect x="455" y="196" width="45" height="14" class="barB"/>
  <text x="392" y="232" class="txt">left</text><text x="460" y="232" class="txt">right</text><text x="383" y="82" class="txt">0.9</text><text x="458" y="190" class="txt">0.1</text>
  <text x="383" y="258" class="math">H(B)≈0.47</text>
  <text x="565" y="112" class="math">KL(old || new)</text>
  <text x="565" y="150" class="math">measures policy</text>
  <text x="565" y="180" class="math">shift size</text>
  <text x="565" y="222" class="txt">B is more certain,</text>
  <text x="565" y="246" class="txt">but changes more.</text>
</svg>
