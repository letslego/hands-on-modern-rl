<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" role="img" aria-labelledby="title desc">
  <title id="title">Derivative as Tangent Line</title>
  <desc id="desc">
    A smooth blue curve with a red tangent line at x0, an orange point at x0+h, a horizontal arrow for h, and a vertical arrow for f(x0+h)-f(x0).
  </desc>

  <defs>
    <marker id="arrow-gray" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#9ca3af"/>
    </marker>
    <marker id="arrow-gray-both" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#6b7280"/>
    </marker>
    <marker id="arrow-orange-both" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#d97706"/>
    </marker>
  </defs>

  <rect width="560" height="340" fill="#ffffff"/>

  <g font-family="Georgia, 'Times New Roman', serif">
    <line x1="82" y1="296" x2="510" y2="296" stroke="#c4c9d4" stroke-width="1.8" marker-end="url(#arrow-gray)"/>
    <line x1="82" y1="306" x2="82" y2="54" stroke="#c4c9d4" stroke-width="1.8" marker-end="url(#arrow-gray)"/>

    <text x="516" y="302" font-size="18" fill="#8b909b" font-style="italic">x</text>
    <text x="62" y="48" font-size="18" fill="#8b909b" font-style="italic">f(x)</text>

    <path
      d="M 70.0 143.4 L 77.2 133.2 L 84.3 124.0 L 91.5 115.7 L 98.7 108.3 L 105.8 101.7 L 113.0 95.9 L 120.2 90.8 L 127.3 86.5 L 134.5 82.9 L 141.7 80.0 L 148.8 77.7 L 156.0 76.0 L 163.2 74.9 L 170.3 74.4 L 177.5 74.3 L 184.7 74.7 L 191.8 75.6 L 199.0 76.9 L 206.2 78.6 L 213.3 80.6 L 220.5 82.9 L 227.7 85.6 L 234.8 88.5 L 242.0 91.6 L 249.2 94.9 L 256.3 98.3 L 263.5 101.9 L 270.7 105.6 L 277.8 109.4 L 285.0 113.2 L 292.2 116.9 L 299.3 120.7 L 306.5 124.4 L 313.7 128.0 L 320.8 131.4 L 328.0 134.7 L 335.2 137.9 L 342.3 140.7 L 349.5 143.4 L 356.7 145.7 L 363.8 147.7 L 371.0 149.4 L 378.2 150.7 L 385.3 151.6 L 392.5 152.0 L 399.7 152.0 L 406.8 151.4 L 414.0 150.3 L 421.2 148.6 L 428.3 146.3 L 435.5 143.4 L 442.7 139.8 L 449.8 135.5 L 457.0 130.4 L 464.2 124.6 L 471.3 118.0 L 478.5 110.6 L 485.7 102.3 L 492.8 93.1 L 500.0 83.0"
      fill="none"
      stroke="#4c5cf0"
      stroke-width="4"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <line
      x1="85"
      y1="117.0"
      x2="205"
      y2="26.3"
      stroke="#ff5a5f"
      stroke-width="2.8"
      stroke-dasharray="9 8"
      stroke-linecap="round"
    />

    <circle cx="113.0" cy="95.9" r="6.5" fill="#ff4d4f"/>
    <circle cx="170.3" cy="74.4" r="5.8" fill="#d97706"/>

    <text x="92" y="89" font-size="18" fill="#ff4d4f" font-style="italic">
      x<tspan baseline-shift="sub" font-size="70%">0</tspan>
    </text>
    <text x="173" y="68" font-size="17" fill="#d97706" font-style="italic">
      x<tspan baseline-shift="sub" font-size="70%">0</tspan> + h
    </text>

    <text x="214" y="36" font-size="18" fill="#ff5a5f">
      slope = f'(x<tspan baseline-shift="sub" font-size="70%">0</tspan>)
    </text>

    <line x1="113.0" y1="95.9" x2="198" y2="95.9" stroke="#d97706" stroke-width="1.6" stroke-dasharray="4 4" opacity="0.75"/>
    <line x1="170.3" y1="74.4" x2="198" y2="74.4" stroke="#d97706" stroke-width="1.6" stroke-dasharray="4 4" opacity="0.75"/>
    <line x1="198" y1="95.9" x2="198" y2="74.4" stroke="#d97706" stroke-width="2.2"/>
    <line x1="193" y1="95.9" x2="203" y2="95.9" stroke="#d97706" stroke-width="2.2"/>
    <line x1="193" y1="74.4" x2="203" y2="74.4" stroke="#d97706" stroke-width="2.2"/>
    <text x="210" y="87" font-size="16" fill="#d97706">
      f(x<tspan baseline-shift="sub" font-size="70%">0</tspan> + h) - f(x<tspan baseline-shift="sub" font-size="70%">0</tspan>)
    </text>

    <line x1="113.0" y1="296" x2="113.0" y2="266" stroke="#9ca3af" stroke-width="1.4" stroke-dasharray="4 5"/>
    <line x1="170.3" y1="296" x2="170.3" y2="266" stroke="#9ca3af" stroke-width="1.4" stroke-dasharray="4 5"/>
    <line
      x1="113.0"
      y1="264"
      x2="170.3"
      y2="264"
      stroke="#6b7280"
      stroke-width="2"
      marker-start="url(#arrow-gray-both)"
      marker-end="url(#arrow-gray-both)"
    />
    <text x="138" y="286" font-size="18" fill="#6b7280" font-style="italic">h</text>
  </g>
</svg>
