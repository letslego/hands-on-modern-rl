    <text x="205" y="278" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="14" font-weight="700" fill="#075985"> = prompt +  token</text>
  </g>
