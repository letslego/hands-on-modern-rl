<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">DPO  RLHF  PPO </title>
  <desc id="desc">、PPO  DPO 。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12" />
    </filter>
  </defs>

  <rect width="960" height="420" fill="#f8fafc" />

  <text x="480" y="42" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="24" font-weight="700" fill="#0f172a">
    DPO ： RLHF / PPO 
  </text>

  <g filter="url(#shadow)">
