    <text x="495" y="105" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="17" font-weight="700" fill="#9a3412">PPO / RLHF </text>
    <text x="495" y="136" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="14" fill="#7c2d12"></text>
    <text x="495" y="160" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="14" fill="#7c2d12">Reward Model </text>
    <text x="495" y="184" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="14" fill="#7c2d12">Actor + Critic + Ref + RM</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="680" y="72" width="230" height="145" rx="12" fill="#ecfdf5" stroke="#34d399" />
    <text x="795" y="105" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="17" font-weight="700" fill="#065f46">DPO </text>
    <text x="795" y="136" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="14" fill="#065f46"></text>
    <text x="795" y="160" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="14" fill="#065f46"></text>
    <text x="795" y="184" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="14" fill="#065f46">Policy + Reference</text>
  </g>

  <line x1="310" y1="145" x2="365" y2="145" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)" />
  <line x1="610" y1="145" x2="665" y2="145" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)" />

  <path d="M180 210 C180 300, 340 330, 500 330 S800 300, 795 225" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="8 8" marker-end="url(#arrow)" />
  <text x="500" y="360" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="15" fill="#334155">
    DPO  KL ， RL 
