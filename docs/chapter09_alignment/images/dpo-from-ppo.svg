    <text x="180" y="122" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="17" font-weight="700" fill="#0f172a"> RL </text>
    <text x="180" y="152" text-anchor="middle" font-family="monospace" font-size="15" fill="#334155">maximize reward</text>
    <text x="180" y="178" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="14" fill="#475569"></text>
  </g>

  <g filter="url(#shadow)">
