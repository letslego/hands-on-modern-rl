    <text x="87" y="42" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">S'</text>

    <line x1="45" y1="29" x2="71" y2="29" stroke="#dc2626" stroke-width="2.6" marker-end="url(#arrow)"/>
    <text x="58" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">r = -1</text>

    <rect x="174" y="174" width="58" height="58" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="203" y="200" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">(3,3)</text>
