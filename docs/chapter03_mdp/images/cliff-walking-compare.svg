<svg xmlns="http://www.w3.org/2000/svg" width="520" height="280" viewBox="0 0 520 280">
  <g font-family="Arial, 'Noto Sans SC', sans-serif">

    <!-- ===== Left: Q-Learning ===== -->
    <text x="150" y="16" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">Q-Learning（Off-policy）</text>
    <text x="150" y="30" text-anchor="middle" font-size="10" fill="#6b7280"></text>

    <!-- Grid 12x4, cell size 24x36 -->
    <g transform="translate(6,38)">
      <!-- Grid lines -->
      <rect x="0" y="0" width="288" height="144" fill="none" stroke="#94a3b8" stroke-width="1"/>
      <!-- Vertical lines -->
      <g stroke="#94a3b8" stroke-width="0.5">
        <line x1="24" y1="0" x2="24" y2="144"/>
        <line x1="48" y1="0" x2="48" y2="144"/>
        <line x1="72" y1="0" x2="72" y2="144"/>
        <line x1="96" y1="0" x2="96" y2="144"/>
        <line x1="120" y1="0" x2="120" y2="144"/>
        <line x1="144" y1="0" x2="144" y2="144"/>
        <line x1="168" y1="0" x2="168" y2="144"/>
        <line x1="192" y1="0" x2="192" y2="144"/>
        <line x1="216" y1="0" x2="216" y2="144"/>
        <line x1="240" y1="0" x2="240" y2="144"/>
        <line x1="264" y1="0" x2="264" y2="144"/>
      </g>
      <!-- Horizontal lines -->
      <g stroke="#94a3b8" stroke-width="0.5">
        <line x1="0" y1="36" x2="288" y2="36"/>
        <line x1="0" y1="72" x2="288" y2="72"/>
        <line x1="0" y1="108" x2="288" y2="108"/>
      </g>

      <!-- Cliff cells (bottom row except S and G) -->
      <g fill="#fef2f2">
        <rect x="24" y="108" width="24" height="36"/>
        <rect x="48" y="108" width="24" height="36"/>
        <rect x="72" y="108" width="24" height="36"/>
        <rect x="96" y="108" width="24" height="36"/>
        <rect x="120" y="108" width="24" height="36"/>
        <rect x="144" y="108" width="24" height="36"/>
        <rect x="168" y="108" width="24" height="36"/>
        <rect x="192" y="108" width="24" height="36"/>
        <rect x="216" y="108" width="24" height="36"/>
        <rect x="240" y="108" width="24" height="36"/>
      </g>
      <!-- Cliff labels -->
      <g fill="#dc2626" font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="central">
        <text x="36" y="126">C</text><text x="60" y="126">C</text><text x="84" y="126">C</text>
        <text x="108" y="126">C</text><text x="132" y="126">C</text><text x="156" y="126">C</text>
        <text x="180" y="126">C</text><text x="204" y="126">C</text><text x="228" y="126">C</text>
        <text x="252" y="126">C</text>
      </g>

      <!-- Start S -->
      <text x="12" y="126" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="#0f172a">S</text>

      <!-- Goal G -->
      <rect x="264" y="108" width="24" height="36" fill="#dcfce7"/>
      <text x="276" y="126" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="#166534">G</text>

      <!-- Q-Learning path: along cliff edge (bottom row) -->
      <polyline points="12,108 36,108 60,108 84,108 108,108 132,108 156,108 180,108 204,108 228,108 252,108 276,108"
                fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <g fill="#2563eb">
        <circle cx="12" cy="108" r="3"/>
        <circle cx="36" cy="108" r="3"/>
        <circle cx="60" cy="108" r="3"/>
        <circle cx="84" cy="108" r="3"/>
        <circle cx="108" cy="108" r="3"/>
        <circle cx="132" cy="108" r="3"/>
        <circle cx="156" cy="108" r="3"/>
        <circle cx="180" cy="108" r="3"/>
        <circle cx="204" cy="108" r="3"/>
        <circle cx="228" cy="108" r="3"/>
        <circle cx="252" cy="108" r="3"/>
        <circle cx="276" cy="108" r="3"/>
      </g>
    </g>

    <!-- ===== Right: SARSA ===== -->
    <text x="400" y="16" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">SARSA（On-policy）</text>
    <text x="400" y="30" text-anchor="middle" font-size="10" fill="#6b7280"></text>

    <g transform="translate(256,38)">
      <!-- Grid lines -->
      <rect x="0" y="0" width="288" height="144" fill="none" stroke="#94a3b8" stroke-width="1"/>
      <g stroke="#94a3b8" stroke-width="0.5">
        <line x1="24" y1="0" x2="24" y2="144"/>
        <line x1="48" y1="0" x2="48" y2="144"/>
        <line x1="72" y1="0" x2="72" y2="144"/>
        <line x1="96" y1="0" x2="96" y2="144"/>
        <line x1="120" y1="0" x2="120" y2="144"/>
        <line x1="144" y1="0" x2="144" y2="144"/>
        <line x1="168" y1="0" x2="168" y2="144"/>
        <line x1="192" y1="0" x2="192" y2="144"/>
        <line x1="216" y1="0" x2="216" y2="144"/>
        <line x1="240" y1="0" x2="240" y2="144"/>
        <line x1="264" y1="0" x2="264" y2="144"/>
      </g>
      <g stroke="#94a3b8" stroke-width="0.5">
        <line x1="0" y1="36" x2="288" y2="36"/>
        <line x1="0" y1="72" x2="288" y2="72"/>
        <line x1="0" y1="108" x2="288" y2="108"/>
      </g>

      <!-- Cliff cells -->
      <g fill="#fef2f2">
        <rect x="24" y="108" width="24" height="36"/>
        <rect x="48" y="108" width="24" height="36"/>
        <rect x="72" y="108" width="24" height="36"/>
        <rect x="96" y="108" width="24" height="36"/>
        <rect x="120" y="108" width="24" height="36"/>
        <rect x="144" y="108" width="24" height="36"/>
        <rect x="168" y="108" width="24" height="36"/>
        <rect x="192" y="108" width="24" height="36"/>
        <rect x="216" y="108" width="24" height="36"/>
        <rect x="240" y="108" width="24" height="36"/>
      </g>
      <g fill="#dc2626" font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="central">
        <text x="36" y="126">C</text><text x="60" y="126">C</text><text x="84" y="126">C</text>
        <text x="108" y="126">C</text><text x="132" y="126">C</text><text x="156" y="126">C</text>
        <text x="180" y="126">C</text><text x="204" y="126">C</text><text x="228" y="126">C</text>
        <text x="252" y="126">C</text>
      </g>

      <text x="12" y="126" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="#0f172a">S</text>
      <rect x="264" y="108" width="24" height="36" fill="#dcfce7"/>
      <text x="276" y="126" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="#166534">G</text>

      <!-- SARSA path: goes up, across top, then down to G -->
      <polyline points="12,108 12,72 12,36 12,0 36,0 60,0 84,0 108,0 132,0 156,0 180,0 204,0 228,0 252,0 276,0 276,36 276,72 276,108"
                fill="none" stroke="#059669" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <g fill="#059669">
        <circle cx="12" cy="108" r="3"/>
        <circle cx="12" cy="72" r="3"/>
        <circle cx="12" cy="36" r="3"/>
        <circle cx="12" cy="0" r="3"/>
        <circle cx="36" cy="0" r="3"/>
        <circle cx="60" cy="0" r="3"/>
        <circle cx="84" cy="0" r="3"/>
        <circle cx="108" cy="0" r="3"/>
        <circle cx="132" cy="0" r="3"/>
        <circle cx="156" cy="0" r="3"/>
        <circle cx="180" cy="0" r="3"/>
        <circle cx="204" cy="0" r="3"/>
        <circle cx="228" cy="0" r="3"/>
        <circle cx="252" cy="0" r="3"/>
        <circle cx="276" cy="0" r="3"/>
        <circle cx="276" cy="36" r="3"/>
        <circle cx="276" cy="72" r="3"/>
        <circle cx="276" cy="108" r="3"/>
      </g>
    </g>

  </g>
</svg>
