name: Build PDF release asset

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-pdf-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          asset_name="hands-on-modern-rl-open-textbook-v${version}.pdf"
          en_asset_name="hands-on-modern-rl-open-textbook-en-v${version}.pdf"
          epub_asset_name="hands-on-modern-rl-open-textbook-v${version}.epub"
          en_epub_asset_name="hands-on-modern-rl-open-textbook-en-v${version}.epub"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "asset_name=${asset_name}" >> "$GITHUB_OUTPUT"
          echo "en_asset_name=${en_asset_name}" >> "$GITHUB_OUTPUT"
          echo "epub_asset_name=${epub_asset_name}" >> "$GITHUB_OUTPUT"
          echo "en_epub_asset_name=${en_epub_asset_name}" >> "$GITHUB_OUTPUT"
          echo "pdf_path=docs/.vitepress/dist/${asset_name}" >> "$GITHUB_OUTPUT"
          echo "en_pdf_path=docs/.vitepress/dist/${en_asset_name}" >> "$GITHUB_OUTPUT"
          echo "epub_path=docs/.vitepress/dist/${epub_asset_name}" >> "$GITHUB_OUTPUT"
          echo "en_epub_path=docs/.vitepress/dist/${en_epub_asset_name}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.release.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install LaTeX and image conversion tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-xetex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-lang-chinese \
            fonts-noto-cjk \
            librsvg2-bin \
            imagemagick \
            ffmpeg \
            webp \
            poppler-utils \
            ghostscript
          echo "Font diagnostics:"
          fc-match "Noto Serif CJK SC"
          fc-match "Noto Sans CJK SC"
          fc-match "Noto Sans Mono CJK SC"

      - name: Setup Chrome for diagram rendering
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Build Chinese LaTeX book PDF
        run: node scripts/build-latex-book.mjs --limit 0
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          PDF_VERSION: ${{ steps.release.outputs.version }}
          PDF_BOOK_LIMIT: 0
          LATEX_BOOK_FILE_NAME: ${{ steps.release.outputs.asset_name }}
          PDF_OPTIMIZE: 1
          PDF_OPTIMIZE_PROFILE: default
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Build Chinese EPUB
        run: npm run epub:build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          EPUB_FILE_NAME: ${{ steps.release.outputs.epub_asset_name }}
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Upload Chinese LaTeX debug logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: chinese-latex-debug-${{ steps.release.outputs.tag }}
          path: |
            temp/latex-book/book.tex
            temp/latex-book/*.log
          if-no-files-found: ignore

      - name: Build English LaTeX book PDF
        run: node scripts/build-latex-book.mjs --limit 0
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          PDF_VERSION: ${{ steps.release.outputs.version }}
          PDF_LOCALE: en
          PDF_BOOK_LIMIT: 0
          LATEX_BOOK_FILE_NAME: ${{ steps.release.outputs.en_asset_name }}
          PDF_OPTIMIZE: 1
          PDF_OPTIMIZE_PROFILE: default
          PDF_AUTHORS: letslego; Sanbu
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Build English EPUB
        run: npm run epub:build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          EPUB_FILE_NAME: ${{ steps.release.outputs.en_epub_asset_name }}
          PDF_LOCALE: en
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Upload English LaTeX debug logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: english-latex-debug-${{ steps.release.outputs.tag }}
          path: |
            temp/latex-book/book.tex
            temp/latex-book/*.log
          if-no-files-found: ignore

      - name: Verify PDF and EPUB assets
        run: |
          test -s "${PDF_PATH}"
          test -s "${EN_PDF_PATH}"
          test -s "${EPUB_PATH}"
          test -s "${EN_EPUB_PATH}"
          echo "Chinese PDF:"
          pdfinfo "${PDF_PATH}" | sed -n '1,18p'
          echo "English PDF:"
          pdfinfo "${EN_PDF_PATH}" | sed -n '1,18p'
          echo "Chinese EPUB:"
          ls -lh "${EPUB_PATH}"
          echo "English EPUB:"
          ls -lh "${EN_EPUB_PATH}"
        env:
          PDF_PATH: ${{ steps.release.outputs.pdf_path }}
          EN_PDF_PATH: ${{ steps.release.outputs.en_pdf_path }}
          EPUB_PATH: ${{ steps.release.outputs.epub_path }}
          EN_EPUB_PATH: ${{ steps.release.outputs.en_epub_path }}

      - name: Write release notes
        env:
          TAG_NAME: ${{ steps.release.outputs.tag }}
          PDF_ASSET_NAME: ${{ steps.release.outputs.asset_name }}
          EN_PDF_ASSET_NAME: ${{ steps.release.outputs.en_asset_name }}
          EPUB_ASSET_NAME: ${{ steps.release.outputs.epub_asset_name }}
          EN_EPUB_ASSET_NAME: ${{ steps.release.outputs.en_epub_asset_name }}
        run: |
          pdf_url=”https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/${PDF_ASSET_NAME}”
          en_pdf_url=”https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/${EN_PDF_ASSET_NAME}”
          epub_url=”https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/${EPUB_ASSET_NAME}”
          en_epub_url=”https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/${EN_EPUB_ASSET_NAME}”
          cat > release-notes.md <<EOF
          # Hands-On Modern RL: Open Textbook Release ${TAG_NAME}

          This release publishes the book-form edition of **Hands-On Modern RL** in both PDF and EPUB formats, in both Chinese and English. The books are generated from the open course repository and typeset as a textbook edition for offline reading, classroom use, and citation-friendly distribution.

          《Hands-On Modern RL：》， PDF  EPUB ，。，，、。

          ## PDF Downloads / PDF 

          - [Chinese edition /  PDF](${pdf_url})
          - [English edition /  PDF](${en_pdf_url})

          ## EPUB Downloads / EPUB 

          - [Chinese edition /  EPUB](${epub_url})
          - [English edition /  EPUB](${en_epub_url})

          ## About This Edition / 

          **English.** This edition covers a practice-first path through modern reinforcement learning: classic control, value and policy methods, deep RL, preference alignment, RLHF-style post-training, DPO, GRPO, RLVR, agentic RL, and multimodal reinforcement learning topics. The release also introduces a complete English edition built from \`docs/en\`, aligned with the Chinese course structure.

          **。** ””：、，、、RLHF 、DPO、GRPO、RLVR、Agentic RL 。 \`docs/en\` ，。

          ## Textbook Features / 

          - Book-style LaTeX typesetting, not a browser print export.
          - Dedicated front matter, chapter openings, page headers, footers, and page numbers.
          - Clickable table of contents and PDF bookmarks/outlines.
          - EPUB format optimized for e-readers and mobile devices.
          - Rendered mathematical notation, diagrams, Mermaid figures, SVG assets, and selected animated assets converted for static reading.
          - Optimized structure and embedded fonts for release download, archiving, and offline study.
          - 、，。
          - 、、 Markdown 。

          ## Citation / 

          If you use this textbook in teaching, reading groups, course notes, or derivative materials, please cite the repository and release version:

          、、，：

          \`\`\`text
          Hands-On Modern RL: Open Textbook, ${TAG_NAME}.
          letslego; Sanbu.
          https://github.com/${GITHUB_REPOSITORY}
          \`\`\`

          ## Release Assets / 

          GitHub automatically adds **Source code (zip)** and **Source code (tar.gz)** to every release. Those files are source archives, not the textbook. For reading, download:

          GitHub  Release  **Source code (zip)**  **Source code (tar.gz)**。，。：

          - \`${PDF_ASSET_NAME}\` - Chinese PDF /  PDF
          - \`${EN_PDF_ASSET_NAME}\` - English PDF /  PDF
          - \`${EPUB_ASSET_NAME}\` - Chinese EPUB /  EPUB
          - \`${EN_EPUB_ASSET_NAME}\` - English EPUB /  EPUB

          **Repository / **: https://github.com/${GITHUB_REPOSITORY}

          **Full Changelog / **: https://github.com/${GITHUB_REPOSITORY}/commits/${TAG_NAME}
          EOF

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: Hands-On Modern RL Open Textbook ${{ steps.release.outputs.tag }}
          body_path: release-notes.md
          files: |
            ${{ steps.release.outputs.pdf_path }}
            ${{ steps.release.outputs.en_pdf_path }}
            ${{ steps.release.outputs.epub_path }}
            ${{ steps.release.outputs.en_epub_path }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
